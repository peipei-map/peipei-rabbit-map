<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>培培環台兔子友善餐廳</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="./styles.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body data-mode="public">
<header class="siteHeader">
  <div class="brandRow">
    <img class="brandRabbit" src="./images/reserve.png" alt="培培">
    <h1>培培環台兔子友善餐廳</h1>
  </div>
  <div class="top"></div>
</header>

<main class="wrap">
  <section class="publicLayout">

    <section class="panel">
      <div class="kpis">
        <!-- 原本五個 KPI 放這裡，不用改內容 -->
      </div>

      <div class="progress">
        <div id="bar" class="bar"></div>
      </div>

      <div class="filters">
        <!-- 原本搜尋列、地區、狀態篩選放這裡 -->
      </div>
    </section>

    <section class="mapPanel">
      <div id="map"></div>
    </section>

    <section class="panel">
      <div id="cards">讀取 Firebase...</div>
    </section>

  </section>
</main>
<script type="module" src="./app.js"></script>
</body>
</html>
